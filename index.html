<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Foto para o Drive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-cloud-upload-alt"></i> Enviar Foto para o Drive</h1>

        <div class="media-container">
            <video id="cameraView" autoplay playsinline></video>
            <img id="imagePreview" alt="Pré-visualização da imagem">
            <div class="placeholder" id="placeholder">
                <i class="fas fa-image"></i>
                <p>Nenhuma imagem selecionada</p>
            </div>
            <div id="realTimeText"></div>
        </div>

        <div class="button-container">
            <div class="button-row">
                <button id="toggleCamera" class="btn btn-primary" title="Abrir Câmera">
                    <i class="fas fa-camera"></i>
                </button>
                <button id="chooseFile" class="btn btn-secondary" title="Escolher Arquivo">
                    <i class="fas fa-file-upload"></i>
                </button>
                <button id="addTextBtn" class="btn btn-accent" title="Adicionar Texto">
                    <i class="fas fa-font"></i>
                </button>
                <input type="file" id="fileInput" accept="image/*">
            </div>
        </div>

        <div id="filtersContainer" class="filters-container">
            <h3><i class="fas fa-sliders-h"></i> Filtros</h3>
            <div class="filters-scroll">
                <div class="filter-btn" data-filter="none">
                    <img src="https://via.placeholder.com/80" class="filter-preview" alt="Sem Filtro">
                </div>
                <div class="filter-btn" data-filter="grayscale(100%)">
                    <img src="https://via.placeholder.com/80" class="filter-preview" alt="Escala de Cinza">
                </div>
                <div class="filter-btn" data-filter="sepia(100%)">
                    <img src="https://via.placeholder.com/80" class="filter-preview" alt="Sépia">
                </div>
                <div class="filter-btn" data-filter="brightness(150%)">
                    <img src="https://via.placeholder.com/80" class="filter-preview" alt="Brilho">
                </div>
                <div class="filter-btn" data-filter="contrast(150%)">
                    <img src="https://via.placeholder.com/80" class="filter-preview" alt="Contraste">
                </div>
                <div class="filter-btn" data-filter="saturate(200%)">
                    <img src="https://via.placeholder.com/80" class="filter-preview" alt="Saturação">
                </div>
                <div class="filter-btn" data-filter="hue-rotate(90deg)">
                    <img src="https://via.placeholder.com/80" class="filter-preview" alt="Rotação de Matiz">
                </div>
                <div class="filter-btn" data-filter="blur(2px)">
                    <img src="https://via.placeholder.com/80" class="filter-preview" alt="Desfoque">
                </div>
            </div>
            <div class="filter-controls">
                <label for="filterIntensity">Intensidade:</label>
                <input type="range" id="filterIntensity" min="0" max="100" value="100">
            </div>
        </div>

        <div class="upload-button-container">
            <button id="uploadBtn" class="btn btn-success">
                <i class="fas fa-cloud-upload-alt"></i> Enviar
            </button>
        </div>

        <div id="status" class="status"></div>

        <div id="progressContainer" class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
            <div id="progressText" class="progress-text">0%</div>
        </div>
    </div>

    <div id="textToolbar" class="text-toolbar" style="display: none;">
        <div class="text-controls">
            <input type="color" id="textColor" value="#000000">
            <button id="changeFont" class="btn-text">Arial</button>
            <button id="changeAlign" class="btn-text"><i class="fas fa-align-center"></i></button>
            <button id="finishText" class="btn-text done">Concluir</button>
        </div>
    </div>

    <div id="cameraMenu" class="camera-menu" style="display: none;">
        <div class="camera-controls">
            <button id="capturePhoto" class="btn btn-primary" title="Capturar Foto">
                <i class="fas fa-camera"></i>
            </button>
            <button id="switchCamera" class="btn btn-secondary" title="Alternar Câmera">
                <i class="fas fa-sync-alt"></i>
            </button>
            <button id="exitCamera" class="btn btn-danger" title="Sair da Câmera">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
